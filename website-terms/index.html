<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Website Terms | Nineteen Point Two</title>
    <meta
      name="description"
      content="Website terms for Nineteen Point Two are being prepared and will be published shortly."
    />
    <link rel="icon" href="/assets/favicon/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --ink: #f7f3ee;
        --muted: rgba(247, 243, 238, 0.72);
        --charcoal: #1a1a2e;
        --line: rgba(247, 243, 238, 0.14);
        --max: 1180px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(
          180deg,
          var(--charcoal) 0%,
          #111120 54%,
          #0b0b15 100%
        );
        color: var(--ink);
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      header,
      footer {
        border-bottom: 1px solid var(--line);
        padding: 24px;
      }
      footer {
        border-top: 1px solid var(--line);
        border-bottom: 0;
        color: rgba(247, 243, 238, 0.58);
      }
      .wrap,
      .footer-grid {
        max-width: var(--max);
        margin: 0 auto;
      }
      .brand-logo {
        height: 36px;
        width: auto;
      }
      main {
        padding: 96px 24px 120px;
      }
      .panel {
        max-width: 760px;
      }
      .eyebrow {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.78rem;
        font-weight: 700;
      }
      h1 {
        margin: 18px 0 20px;
        font-size: clamp(2.6rem, 7vw, 5rem);
        line-height: 0.96;
      }
      p {
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1.7;
        margin: 0;
      }
      .footer-grid {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        flex-wrap: wrap;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <!-- Draft legal placeholder. Replace with approved legal content before indexing. -->
    <header>
      <div class="wrap">
        <a href="/" aria-label="Nineteen Point Two home">
          <img
            class="brand-logo"
            src="/assets/logo/logo-horizontal.svg"
            alt="Nineteen Point Two"
          />
        </a>
      </div>
    </header>
    <main>
      <div class="wrap panel">
        <div class="eyebrow">Legal</div>
        <h1>Website Terms</h1>
        <p>This page is being prepared and will be published shortly.</p>
      </div>
    </main>
    <footer>
      <div class="footer-grid">
        <span>&copy; 2026 Nineteen Point Two</span>
        <span
          ><a href="/legal/">Legal</a> | <a href="/privacy/">Privacy</a> |
          <a href="/cookies/">Cookies</a> |
          <a href="/website-terms/">Website Terms</a> |
          <a href="/subprocessors/">Subprocessors</a></span
        >
      </div>
    </footer>
  </body>
</html>
